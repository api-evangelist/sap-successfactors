aid: sap-successfactors
name: SAP SuccessFactors
description: >-
  SAP SuccessFactors is a cloud-based human capital management (HCM) suite
  that covers core HR, payroll, talent management, learning, recruiting,
  performance, and workforce analytics for enterprises. The SuccessFactors
  HXM Suite OData APIs (v2 and v4) provide CRUD access to Employee Central,
  Recruiting, Onboarding, Learning, and other HCM modules using OAuth 2.0
  or HTTP Basic authentication.
